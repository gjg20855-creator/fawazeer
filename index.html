<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الفوازير - التحديث الجديد</title>
    <style>
        :root { --p: #00b894; --bg: #f7f9fb; --dark: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app { width: 100%; max-width: 450px; background: white; border-radius: 25px; padding: 25px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); min-height: 600px; display: flex; flex-direction: column; }
        .timer { background: #f0f0f0; display: inline-flex; padding: 10px 25px; border-radius: 50px; font-weight: bold; margin: 10px auto 20px; border: 2px solid #ddd; font-family: monospace; font-size: 1.8rem; color: var(--dark); }
        .q-text { font-size: 1.4rem; font-weight: bold; margin-bottom: 5px; color: var(--dark); }
        .hint { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        .opt { width: 100%; padding: 18px; margin-bottom: 12px; border: 2px solid #edf2f7; border-radius: 15px; cursor: pointer; transition: 0.2s; box-sizing: border-box; text-align: right; font-size: 1.1rem; color: #4a5568; }
        .opt.active { border-color: var(--p); background: #f0fff4; color: var(--p); font-weight: bold; }
        .footer-btn { background: var(--p); color: white; width: 100%; padding: 20px; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: auto; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app">
    <div id="start-s">
        <h1 style="color:var(--p); margin-top:50px;">التحديث الجديد 🚀</h1>
        <p>تحدي الأسئلة اليومي</p>
        <button class="footer-btn" onclick="start()">ابدأ التحدي</button>
    </div>

    <div id="quiz-s" class="hidden">
        <div class="timer" id="disp">00:00:00</div>
        <div id="prog" style="color:#a0aec0; margin-bottom:5px;">السؤال 1</div>
        <div class="q-text" id="q-txt"></div>
        <div class="hint" id="q-hint"></div>
        <div id="opts"></div>
        <button class="footer-btn" onclick="checkAnswer()">إرسال الإجابة</button>
    </div>

    <div id="end-s" class="hidden">
        <h2 style="color:var(--p); margin-top:30px;">كفو! انتهيت</h2>
        <div id="score-txt" style="font-size: 1.5rem; margin: 20px 0;"></div>
        <p>وقتك الإجمالي:</p>
        <h1 id="final-time" style="font-size:3.5rem; margin:10px 0;"></h1>
        <button class="footer-btn" onclick="location.reload()">إعادة التحدي</button>
    </div>
</div>

<script>
    // --- الأسئلة المحدثة بناءً على صورك ---
    const qs = [
        {
            q: "أغنياء الصحابة 5، ولكن من هو أغناهم؟",
            o: ["عبدالرحمن بن عوف", "الزبير بن العوام", "عثمان بن عفان", "سعد بن أبي وقاص"],
            c: [0], // عبدالرحمن بن عوف
            multi: false
        },
        {
            q: "كمّل المثل: ما يذوق العز خمام .....",
            o: ["الوسايد", "المخدات", "اللحاف", "الكنب"],
            c: [0], // الوسايد
            multi: false
        },
        {
            q: "متى تم إطلاق رمز الريال السعودي؟",
            o: ["2024", "2025", "2023", "2020"],
            c: [1], // 2025
            multi: false
        }
    ];

    let idx = 0, startT, requestID, selectedOpts = [], correctCount = 0;

    function start() {
        document.getElementById('start-s').classList.add('hidden');
        document.getElementById('quiz-s').classList.remove('hidden');
        startT = performance.now();
        requestID = requestAnimationFrame(updateTimer);
        show();
    }

    function updateTimer() {
        let d = performance.now() - startT;
        let s = Math.floor(d / 1000);
        let ms = Math.floor((d % 1000) / 10);
        document.getElementById('disp').innerText = `00:${s.toString().padStart(2, '0')}:${ms.toString().padStart(2, '0')}`;
        requestID = requestAnimationFrame(updateTimer);
    }

    function show() {
        selectedOpts = [];
        const q = qs[idx];
        document.getElementById('q-txt').innerText = q.q;
        document.getElementById('q-hint').innerText = q.multi ? "(اختر إجابتين صحيحة)" : "(اختر إجابة واحدة)";
        document.getElementById('prog').innerText = `السؤال ${idx+1} من ${qs.length}`;
        const div = document.getElementById('opts');
        div.innerHTML = '';
        q.o.forEach((n, i) => {
            const b = document.createElement('div');
            b.className = 'opt';
            b.innerText = n;
            b.onclick = () => select(i, b, q.multi);
            div.appendChild(b);
        });
    }

    function select(i, el, isMulti) {
        if (!isMulti) {
            document.querySelectorAll('.opt').forEach(x => x.classList.remove('active'));
            selectedOpts = [i];
            el.classList.add('active');
        } else {
            if (selectedOpts.includes(i)) {
                selectedOpts = selectedOpts.filter(x => x !== i);
                el.classList.remove('active');
            } else {
                selectedOpts.push(i);
                el.classList.add('active');
            }
        }
    }

    function checkAnswer() {
        if (selectedOpts.length === 0) return alert("الرجاء اختيار إجابة!");
        const q = qs[idx];
        const isCorrect = q.c.length === selectedOpts.length && q.c.every(v => selectedOpts.includes(v));
        if (isCorrect) correctCount++;
        if (++idx < qs.length) show(); else finish();
    }

    function finish() {
        cancelAnimationFrame(requestID);
        document.getElementById('quiz-s').classList.add('hidden');
        document.getElementById('end-s').classList.remove('hidden');
        document.getElementById('score-txt').innerText = `أجبت على ${correctCount} من ${qs.length} صح!`;
        document.getElementById('final-time').innerText = document.getElementById('disp').innerText;
    }
</script>
</body>
</html>
